name: Deploy Ta Cukrárna to VPS

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

# 🔒 SECURITY: Define minimal permissions for GITHUB_TOKEN
permissions:
  contents: read # Allow checkout
  actions: read # Allow artifact operations

env:
  # Security: Define trusted events for self-hosted runners
  IS_TRUSTED_EVENT: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
  SSH_AUTH_SOCK: /tmp/ssh_agent.sock
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security:
    name: Security Scan
    runs-on: self-hosted
    permissions:
      contents: read # Read repository code for scanning

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm config set update-notifier false
          npm ci

      - name: Run security scan
        run: npm run lint:secrets

  lint:
    name: Code Quality
    runs-on: self-hosted
    permissions:
      contents: read # Read repository code for linting
    # Lint can run in parallel with security
    # needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm config set update-notifier false
          npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run HTML validation
        run: npm run lint:html

      - name: Run Markdown lint
        run: npm run lint:md

      - name: Check formatting
        run: npm run format:check

  build:
    name: Build Application
    runs-on: self-hosted
    needs: [security, lint]
    permissions:
      contents: read # Read repository code
      actions: write # Upload artifacts

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: |
          npm config set update-notifier false
          npm ci

      - name: Build application
        env:
          NEXT_PUBLIC_CLARITY_ID: ${{ secrets.NEXT_PUBLIC_CLARITY_ID }}
        run: npm run build

      - name: Upload build artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: ta-cukrarna-build
          path: |
            out/
            package.json
            package-lock.json
          retention-days: 1

  e2e:
    name: E2E Tests (Playwright)
    needs: build
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm config set update-notifier false
          npm ci

      - name: Run E2E Tests
        run: npm run test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Deploy to VPS
    needs: [build, e2e]
    runs-on: self-hosted
    # 🔒 SECURITY: Only deploy on version tags (not PRs)
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    permissions:
      contents: read # Read repository code
      actions: read # Download artifacts

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: ta-cukrarna-build

      - name: Setup SSH agent
        run: |
          eval $(ssh-agent -a $SSH_AUTH_SOCK)
          ssh-add - <<< "${{ secrets.VPS_SSH_KEY }}"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock

      - name: Diagnostic - Verify Secrets (Secure)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "🔍 Diagnostic check for VPS secrets..."
          if [ -z "$VPS_HOST" ]; then echo "❌ VPS_HOST is MISSING"; else echo "✅ VPS_HOST is present (length: ${#VPS_HOST})"; fi
          if [ -z "$VPS_USER" ]; then echo "❌ VPS_USER is MISSING"; else echo "✅ VPS_USER is present (length: ${#VPS_USER})"; fi
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then echo "❌ VPS_SSH_KEY is MISSING"; else echo "✅ VPS_SSH_KEY is present"; fi

      - name: Add server to known hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "🔑 Adding server to known hosts..."
          mkdir -p ~/.ssh
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
          echo "Host keys added for $VPS_HOST"

      - name: Create backup on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "🚀 Starting static deployment to VPS..."

          # Create backup and ensure apps/website exists
          echo "📦 Creating backup..."
          ssh $VPS_USER@$VPS_HOST 'cp -r ./apps/website ./backups/website-backup-$(date +%Y%m%d-%H%M%S)'

      - name: Deploy to VPS
        if: always()
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "🚀 Starting static deployment to VPS..."

          # Deploy static files to user's apps/website
          echo "📤 Deploying static files to ~/apps/website..."
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" --exclude-from='.rsyncignore' ./out/ $VPS_USER@$VPS_HOST:apps/website/

          # Set proper permissions (no sudo needed)
          echo "Setting proper file permissions..."
          # The permissions should not be changed
          # ssh $VPS_USER@$VPS_HOST chmod -R 755 ./apps/website
          ssh $VPS_USER@$VPS_HOST "find ./apps/website -type f -exec chmod 644 {} \;"
          echo "Static deployment completed successfully!"

          echo "🎉 Static deployment finished!"

      - name: Cleanup SSH agent
        if: always()
        run: |
          if [ -n "$SSH_AGENT_PID" ]; then
            kill $SSH_AGENT_PID || true
          fi

  verify:
    name: Verify Deployment
    needs: deploy
    runs-on: self-hosted
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read # Read repository code for verification

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Wait for deployment stabilization
        run: |
          echo "⏳ Waiting 30 seconds for deployment to stabilize..."
          sleep 30

      - name: Run deployment verification
        run: ./scripts/verify-deployment.sh

  cleanup:
    name: Cleanup
    needs: [deploy, verify]
    runs-on: self-hosted
    if: always() && startsWith(github.ref, 'refs/tags/v')
    permissions: {}

    steps:
      - name: Finalize
        run: echo "Deployment process finished."
